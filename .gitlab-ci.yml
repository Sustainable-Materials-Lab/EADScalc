# included templates
include:
  # Python template
  - component: "$CI_SERVER_FQDN/to-be-continuous/python/gitlab-ci-python@latest"
    # rules:
    #   - if: $CI_COMMIT_TAG
    inputs:
      package-enabled: true
      publish-enabled: true
      # trivy-disabled: true
      sbom-disabled: true
      build-system: "uv"
  # semantic-release template
  - component: "$CI_SERVER_FQDN/to-be-continuous/semantic-release/gitlab-ci-semrel@latest"
    inputs:
      changelog-enabled: true
      auto-release-enabled: true
      commit-spec: conventionalcommits